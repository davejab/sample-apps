{{- if .Values.ratings.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ratings.serviceAccountName" . }}
  labels:
    {{- include "ratings.labels" . | nindent 4 }}
  {{- with .Values.ratings.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.ratings.serviceAccount.automount }}
{{- end }}