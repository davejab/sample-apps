{{- if .Values.details.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "details.serviceAccountName" . }}
  labels:
    {{- include "details.labels" . | nindent 4 }}
  {{- with .Values.details.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.details.serviceAccount.automount }}
{{- end }}
