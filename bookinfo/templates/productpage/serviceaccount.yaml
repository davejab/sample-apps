{{- if .Values.productpage.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "productpage.serviceAccountName" . }}
  labels:
    {{- include "productpage.labels" . | nindent 4 }}
  {{- with .Values.productpage.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.productpage.serviceAccount.automount }}
{{- end }}